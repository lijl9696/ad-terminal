plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
}

android {
    namespace "com.adterminal.player"
    compileSdk 35

    defaultConfig {
        applicationId "com.adterminal.player"
        minSdk 22
        targetSdk 35
        versionCode 3
        versionName "0.1.2"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }
}
