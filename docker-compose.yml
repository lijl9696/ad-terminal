services:
  ad-terminal:
    build: .
    ports:
      - "8787:8787"
    environment:
      NODE_ENV: production
      PORT: 8787
      DATA_DIR: /app/data
      MEDIA_DIR: /app/media
      SESSION_SECRET: change-this-local-secret
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin123
    volumes:
      - ./data:/app/data
      - ./media:/app/media
    restart: unless-stopped
